name: Documentation
description: 记录稳定认知、操作方式或文档治理变化
title: "[Docs] "
labels: ["documentation"]
body:
  - type: textarea
    id: gap
    attributes:
      label: 文档缺口
      description: 哪项稳定认知、操作方式或导航目前不准确或不可发现？
    validations:
      required: true
  - type: textarea
    id: audience
    attributes:
      label: 目标读者
      description: 开发者、维护者还是实际操作者？
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: 事实来源
      description: 指明对应代码、Schema、运维规则或设计决策。
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
    validations:
      required: true
