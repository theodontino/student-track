name: Documentation guard

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  documentation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run docs:check
      - run: npm run docs:links
      - run: npm run privacy:check
